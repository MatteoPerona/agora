app = "agora"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_DATABASE_URL = "sqlite:////app/data/agora.sqlite3"
  UPLOADS_DIR = "/app/data/uploads"
  SIMULATIONS_DIR = "/app/data/simulations"
  # Optional defaults for first-time deployment:
  # Set these to your preferred provider after deploy.
  SIM_PROVIDER = "stub"
  SIM_MODEL = "stub"

[[mounts]]
  source = "agora-data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = false
